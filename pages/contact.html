<section class="max-w-2xl mx-auto p-6 bg-white rounded-4xl shadow-inner mt-10 border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-pink-eclat mb-6 font-lora uppercase">Me contacter</h2>
    
    <form action="https://formspree.io/f/mgoljorr" method="POST" class="space-y-5">
        <!-- FAIRE LA PAGE MERCI -->
        <input type="hidden" name="_next" value="https://ton-site.fr/merci.html">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 ml-2 mb-1">Nom complet</label>
            <input type="text" id="name" name="name" required
                class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-pink-eclat focus:border-transparent outline-none transition-all placeholder-gray-400"
                placeholder="Ex: Jean Dupont">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 ml-2 mb-1">Email</label>
            <input type="email" id="email" name="email" required
                class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-pink-eclat focus:border-transparent outline-none transition-all placeholder-gray-400"
                placeholder="jean.dupont@exemple.com">
        </div>

        <div>
            <label for="message" class="block text-sm font-medium text-gray-700 ml-2 mb-1">Votre message</label>
            <textarea id="message" name="message" rows="4" required
                class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-pink-eclat focus:border-transparent outline-none transition-all placeholder-gray-400 resize-none"
                placeholder="Parlons de votre projet d'alternance..."></textarea>
        </div>

        <div class="flex justify-center pt-2">
            <button type="submit" 
                class="bg-black text-white px-8 py-3 rounded-full font-bold hover:bg-pink-eclat hover:scale-105 active:scale-95 transition-all cursor-pointer shadow-lg">
                Envoyer le message
            </button>
        </div>
    </form>
